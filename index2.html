<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Hue-Shift Palette Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chroma-js/2.4.2/chroma.min.js"></script>
    <style>
        :root {
            --bg-base: #111113;
            --text-base: #ffffff;
            --accent: #027bf3;
            --checkers: repeating-conic-gradient(rgba(128, 128, 128, 0.1) 0% 25%, transparent 0% 50%) 50% / 10px 10px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-base);
            min-height: 100vh;
            display: flex;
            padding: 30px;
            gap: 40px;
            transition: background-color 0.3s, color 0.3s;
        }

        .sidebar {
            width: 320px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .content {
            flex-grow: 1;
            overflow-x: auto;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .control-group label {
            font-size: 13px;
            font-weight: 500;
            opacity: 0.7;
        }

        input[type="text"] {
            width: 100%;
            background: rgba(128, 128, 128, 0.1);
            border: none;
            border-radius: 8px;
            padding: 10px 12px;
            color: inherit;
            font-family: monospace;
            font-size: 14px;
            outline: none;
        }

        input[type="text"]:focus {
            box-shadow: 0 0 0 2px var(--accent);
        }

        .color-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .color-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .color-input-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .color-input-row input[type="text"] {
            flex-grow: 1;
        }

        .remove-btn {
            background: none;
            border: none;
            color: inherit;
            opacity: 0.5;
            padding: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .remove-btn:hover {
            opacity: 1;
            color: #ff4d4f;
        }

        .format-toggle-btn {
            background: rgba(128,128,128,0.1);
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            color: inherit;
            font-family: monospace;
        }
        .format-toggle-btn:hover {
            background: rgba(128,128,128,0.2);
        }

        input[type="color"] {
            -webkit-appearance: none;
            appearance: none;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 6px;
            cursor: pointer;
            padding: 0;
            background: none;
        }

        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }

        input[type="color"]::-webkit-color-swatch {
            border: none;
            border-radius: 6px;
        }

        .btn {
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: filter 0.2s;
        }

        .btn:hover {
            filter: brightness(1.1);
        }

        .btn-primary {
            background: var(--text-base) !important;
            color: var(--bg-base) !important;
            font-weight: 600;
        }

        .btn-outline {
            background: transparent;
            border: 1px dashed rgba(128, 128, 128, 0.4);
            color: inherit;
        }

        .btn-outline:hover {
            opacity: 1;
            border-color: inherit;
        }

        .palette-table {
            display: flex;
            gap: 32px;
            padding-bottom: 40px;
        }

        .palette-col {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .palette-header {
            font-size: 12px;
            font-weight: 600;
            opacity: 0.5;
            padding-bottom: 8px;
        }

        .palette-cell {
            height: 48px;
            display: flex;
            align-items: center;
        }

        .weight-cell {
            width: 60px;
            font-weight: 600;
            font-size: 14px;
            opacity: 0.7;
            justify-content: flex-end;
            padding-right: 12px;
        }

        .color-block {
            width: 140px;
            height: 48px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 12px;
            border: none;
        }

        .format-row {
            display: flex;
            justify-content: space-between;
            font-family: monospace;
            font-size: 10px;
            opacity: 0.9;
        }

        .alpha-wrap {
            width: 140px;
            height: 48px;
            border-radius: 8px;
            background-color: var(--bg-base);
            background-image: var(--checkers);
            overflow: hidden;
            border: none;
        }

        .alpha-inner {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 12px;
        }

        .missing {
            opacity: 0.2;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 140px;
            height: 48px;
            font-size: 12px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            cursor: pointer;
            user-select: none;
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <div>
            <h1 style="font-size: 20px; font-weight: 600; margin-bottom: 8px;">Oklch Generator</h1>
            <p style="font-size: 13px; opacity: 0.7;">Dynamic Custom Colors, No Dark Borders, SVG Clipboard Export.</p>
        </div>

        <button class="btn btn-outline" id="themeSwitchBtn" style="border-style: solid;">Theme: Light</button>

        <div class="control-group">
            <label>Low Contrast Base (Фон)</label>
            <div class="color-input-row">
                <input type="color" id="lowBasePicker" value="#ffffff">
                <input type="text" id="lowBaseText" value="#ffffff">
            </div>
        </div>
        <div class="control-group">
            <label>High Contrast Base (Текст)</label>
            <div class="color-input-row">
                <input type="color" id="highBasePicker" value="#111113">
                <input type="text" id="highBaseText" value="#111113">
            </div>
        </div>

        <div class="control-group">
            <label>Neutral Base Color</label>
            <div class="color-input-row">
                <input type="color" id="neutralBasePicker" value="#808080">
                <input type="text" id="neutralBaseText" value="#808080">
            </div>
        </div>

        <div class="control-group">
            <label class="checkbox-label">
                <input type="checkbox" id="showAlphaCheck" checked> Показывать Alpha
            </label>
            <label class="checkbox-label" style="margin-top: 4px;">
                <input type="checkbox" id="showHueShiftCheck" checked> Включить Hue Shift
            </label>
            <label class="checkbox-label" style="margin-top: 4px;">
                <input type="checkbox" id="showNeutralsCheck"> Нейтральные (Grey Balance)
            </label>
        </div>

        <div class="control-group" style="margin-top: 8px;">
            <label>Lightness Крайних шагов (L%)</label>
            <div class="color-input-row" style="gap: 12px; font-family: monospace;">
                Max:<input type="number" id="maxLightness" value="100" min="0" max="100"
                    style="width:70px; padding: 6px; background: rgba(128,128,128,0.1); border:none; border-radius:4px; color:inherit;">
                Min:<input type="number" id="minLightness" value="0" min="0" max="100"
                    style="width:70px; padding: 6px; background: rgba(128,128,128,0.1); border:none; border-radius:4px; color:inherit;">
            </div>
        </div>

        <hr style="border: none; border-top: 1px dashed rgba(128,128,128,0.3);">

        <div class="control-group">
            <label>Базовые цвета</label>
            <div class="color-list" id="colorList"></div>
            <button class="btn btn-outline" id="addColorBtn">+ Добавить цвет</button>
        </div>

        <button class="btn btn-primary" id="exportSvgBtn" style="margin-top: 20px;">
            Скопировать SVG в буфер
        </button>
    </div>

    <div class="content">
        <div class="palette-table" id="paletteTable"></div>
    </div>

    <script>
        const colorsMap = {
            50: { a: 0.04, c: -1 }, 100: { a: 0.08, c: -1 }, 150: { a: 0.12, c: -1 }, 200: { a: 0.2, c: -1 },
            250: { a: 0.3, c: -1 }, 300: { a: 0.4, c: -1 }, 350: { a: 0.5, c: -1 }, 400: { a: 0.65, c: -1 },
            450: { a: 0.8, c: -1 }, 500: { a: 0.9, c: -1 }, 550: { a: 1, c: 1 }, 600: { a: 0.9, c: 1 },
            650: { a: 0.8, c: 1 }, 700: { a: 0.7, c: 1 }, 750: { a: 0.6, c: 1 }, 800: { a: 0.45, c: 1 },
            850: { a: 0.3, c: 1 }, 900: { a: 0.2, c: 1 }, 950: { a: 0.1, c: 1 }, 1000: { a: 0.04, c: 1 },
        };

        const themes = {
            light: { low: '#ffffff', high: '#111113', name: 'Light' },
            dark: { low: '#111113', high: '#ffffff', name: 'Dark' }
        };

        let currentTheme = 'light';
        let showAlpha = true;
        let useHueShift = true;
        let showNeutrals = false;
        let baseColors = [
            { id: Date.now(), format: 'HEX', value: '#027bf3', hex: '#027bf3', name: 'Brand' }
        ];

        const themeSwitchBtn = document.getElementById('themeSwitchBtn');
        const lowBasePicker = document.getElementById('lowBasePicker');
        const lowBaseText = document.getElementById('lowBaseText');
        const highBasePicker = document.getElementById('highBasePicker');
        const highBaseText = document.getElementById('highBaseText');
        const neutralBasePicker = document.getElementById('neutralBasePicker');
        const neutralBaseText = document.getElementById('neutralBaseText');
        const showAlphaCheck = document.getElementById('showAlphaCheck');
        const showHueShiftCheck = document.getElementById('showHueShiftCheck');
        const showNeutralsCheck = document.getElementById('showNeutralsCheck');
        const maxLightnessInput = document.getElementById('maxLightness');
        const minLightnessInput = document.getElementById('minLightness');
        const colorList = document.getElementById('colorList');
        const addColorBtn = document.getElementById('addColorBtn');
        const paletteTable = document.getElementById('paletteTable');
        const exportSvgBtn = document.getElementById('exportSvgBtn');

        function setupThemeInputs() {
            function updateThemeColors() {
                if (chroma.valid(lowBaseText.value) && chroma.valid(highBaseText.value)) {
                    document.documentElement.style.setProperty('--bg-base', lowBaseText.value);
                    document.documentElement.style.setProperty('--text-base', chroma(lowBaseText.value).luminance() < 0.5 ? '#ffffff' : '#111113');
                    render();
                }
            }

            lowBasePicker.addEventListener('input', (e) => { lowBaseText.value = e.target.value; updateThemeColors(); });
            lowBaseText.addEventListener('input', (e) => { if (chroma.valid(e.target.value)) { lowBasePicker.value = chroma(e.target.value).hex(); updateThemeColors(); } });

            highBasePicker.addEventListener('input', (e) => { highBaseText.value = e.target.value; updateThemeColors(); });
            highBaseText.addEventListener('input', (e) => { if (chroma.valid(e.target.value)) { highBasePicker.value = chroma(e.target.value).hex(); updateThemeColors(); } });

            neutralBasePicker.addEventListener('input', (e) => { neutralBaseText.value = e.target.value; render(); });
            neutralBaseText.addEventListener('input', (e) => { if (chroma.valid(e.target.value)) { neutralBasePicker.value = chroma(e.target.value).hex(); render(); } });

            themeSwitchBtn.addEventListener('click', () => {
                currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
                themeSwitchBtn.textContent = `Theme: ${themes[currentTheme].name}`;
                lowBasePicker.value = themes[currentTheme].low;
                lowBaseText.value = themes[currentTheme].low;
                highBasePicker.value = themes[currentTheme].high;
                highBaseText.value = themes[currentTheme].high;
                updateThemeColors();
            });

            showAlphaCheck.addEventListener('change', (e) => {
                showAlpha = e.target.checked;
                render();
            });

            showHueShiftCheck.addEventListener('change', (e) => {
                useHueShift = e.target.checked;
                render();
            });

            showNeutralsCheck.addEventListener('change', (e) => {
                showNeutrals = e.target.checked;
                render();
            });

            maxLightnessInput.addEventListener('input', render);
            minLightnessInput.addEventListener('input', render);

            addColorBtn.addEventListener('click', () => {
                const newHex = chroma.random().hex();
                baseColors.push({ id: Date.now(), format: 'HEX', value: newHex, hex: newHex, name: 'New Color' });
                renderSidebarColors();
                render();
            });
        }

        function renderSidebarColors() {
            colorList.innerHTML = '';
            baseColors.forEach((color, index) => {
                const item = document.createElement('div');
                item.className = 'color-item';

                const nameInput = document.createElement('input');
                nameInput.type = 'text';
                nameInput.value = color.name;
                nameInput.placeholder = 'Color Name';
                nameInput.oninput = (e) => { color.name = e.target.value; render(); };

                const row = document.createElement('div');
                row.className = 'color-input-row';

                const picker = document.createElement('input');
                picker.type = 'color';
                picker.value = color.hex;

                const formatBtn = document.createElement('button');
                formatBtn.className = 'format-toggle-btn';
                formatBtn.innerText = color.format;

                const textInput = document.createElement('input');
                textInput.type = 'text';
                textInput.value = color.value;

                formatBtn.onclick = () => {
                    color.format = color.format === 'HEX' ? 'HSL' : 'HEX';
                    formatBtn.innerText = color.format;
                    if(color.format === 'HEX') {
                        textInput.value = color.hex;
                        color.value = color.hex;
                    } else {
                        const [h, s, l] = chroma(color.hex).hsl();
                        textInput.value = `${isNaN(h)?0:Math.round(h)}, ${Math.round(s*100)}%, ${Math.round(l*100)}%`;
                        color.value = textInput.value;
                    }
                };

                picker.oninput = (e) => { 
                    color.hex = e.target.value; 
                    if(color.format === 'HEX') {
                        textInput.value = color.hex;
                        color.value = color.hex;
                    } else {
                        const [h, s, l] = chroma(color.hex).hsl();
                        textInput.value = `${isNaN(h)?0:Math.round(h)}, ${Math.round(s*100)}%, ${Math.round(l*100)}%`;
                        color.value = textInput.value;
                    }
                    updateAccentStyles(); render(); 
                };
                textInput.oninput = (e) => { 
                    color.value = e.target.value;
                    let parsedHex = null;
                    if(color.format === 'HSL') {
                        try { parsedHex = chroma(`hsl(${e.target.value})`).hex(); } catch(err){}
                    } else {
                        if(chroma.valid(e.target.value)) parsedHex = chroma(e.target.value).hex();
                    }
                    if (parsedHex) {
                        picker.value = parsedHex; 
                        color.hex = parsedHex; 
                        updateAccentStyles(); render(); 
                    }
                };

                const removeBtn = document.createElement('button');
                removeBtn.className = 'remove-btn';
                removeBtn.innerHTML = '✕';
                removeBtn.onclick = () => { if (baseColors.length > 1) { baseColors.splice(index, 1); updateAccentStyles(); renderSidebarColors(); render(); } };

                row.appendChild(picker);
                row.appendChild(formatBtn);
                row.appendChild(textInput);
                row.appendChild(removeBtn);

                item.appendChild(row);
                item.appendChild(nameInput);
                colorList.appendChild(item);
            });
        }

        function updateAccentStyles() {
            if (baseColors.length > 0) {
                const mainHex = baseColors[0].hex;
                document.documentElement.style.setProperty('--accent', mainHex);
                const luma = chroma(mainHex).luminance();
                const btnCols = document.querySelectorAll('.btn');
                btnCols.forEach(btn => {
                    if (!btn.classList.contains('btn-outline')) {
                        btn.style.color = luma > 0.4 ? '#111113' : '#ffffff';
                    }
                });
            }
        }

        function getBalancedGrayL(target_L, target_C, hue) {
            // Logic: Concession curve (Hue-specific Lightness Offsets)
            // Baseline: Blue (#3E63DD, L ~ 0.544) -> Gray L ~ 0.485 (Delta ~ -0.06 or ~11% reduction)
            
            let sensitivity = 0.28; // Default for "Heavy" colors (Blue, Indigo, Violet)
            let offset = 0;

            if ((hue >= 0 && hue <= 40) || (hue >= 280 && hue <= 360)) {
                // Red, Orange, Purple ("Medium")
                sensitivity = 0.15;
                offset = 0.03; // Allow 15% (relative to delta) lighter
            } else if (hue >= 40 && hue <= 160) {
                // Yellow, Lime, Green ("Light")
                sensitivity = 0.05;
                offset = 0.06; // Allow 30% (relative to delta) lighter
            }

            let balancedL = target_L - (target_C * sensitivity) + offset;
            return Math.max(0, Math.min(1, balancedL));
        }

        function interpolateOklchShifted(baseColorHex, bgHex, ratio, cDirection) {
            const base = chroma(baseColorHex).oklch();
            const bg = chroma(bgHex).oklch();
            let [bL, bC, bH] = base;
            const [gL, gC, gH] = bg;
            if (isNaN(bH)) bH = 0;

            let maxL = parseFloat(maxLightnessInput.value) / 100;
            if (isNaN(maxL)) maxL = 1.0;
            let minL = parseFloat(minLightnessInput.value) / 100;
            if (isNaN(minL)) minL = 0.0;

            // Limit the background lightness (gL) based on user constraints
            let targetL = gL;
            if (targetL > 0.5) {
                targetL = Math.min(targetL, maxL);
            } else {
                targetL = Math.max(targetL, minL);
            }

            const resL = bL * ratio + targetL * (1 - ratio);
            const resC = bC * ratio + (isNaN(gC) ? 0 : gC) * (1 - ratio);

            let resH = bH;
            if (useHueShift) {
                // Determine direction based on target background Lightness (targetL)
                const shiftAmount = (1 - ratio) * 15;
                if (targetL > 0.5) resH = bH + shiftAmount; // Towards Light -> warmer
                else resH = bH - shiftAmount;               // Towards Dark -> cooler
            }
            return chroma.oklch(resL, resC, resH).hex();
        }

        function render() {
            paletteTable.innerHTML = '';

            const keys = Object.keys(colorsMap).sort((a, b) => Number(a) - Number(b));

            const weightCol = document.createElement('div');
            weightCol.className = 'palette-col';
            weightCol.innerHTML = `<div class="palette-header">Шаг</div>`;
            keys.forEach(k => {
                weightCol.innerHTML += `<div class="palette-cell weight-cell">
                    <div>${k}</div>
                </div>`;
            });
            paletteTable.appendChild(weightCol);

            baseColors.forEach(colorItem => {
                const colorHex = colorItem.hex;
                const cName = colorItem.name || 'Color';

                const solidCol = document.createElement('div');
                solidCol.className = 'palette-col';
                solidCol.innerHTML = `<div class="palette-header">${cName} Solid</div>`;

                let alphaCol;
                if (showAlpha) {
                    alphaCol = document.createElement('div');
                    alphaCol.className = 'palette-col';
                    alphaCol.innerHTML = `<div class="palette-header">${cName} Alpha</div>`;
                }

                let neutralCol;
                if (showNeutrals) {
                    neutralCol = document.createElement('div');
                    neutralCol.className = 'palette-col';
                    neutralCol.innerHTML = `<div class="palette-header">${cName} Gray</div>`;
                }

                keys.forEach(k => {
                    const { a, c } = colorsMap[k];
                    const bg = c > 0 ? highBasePicker.value : lowBasePicker.value;
                    const solidHex = interpolateOklchShifted(colorHex, bg, a, c);

                    const textContrast = chroma(solidHex).luminance() > 0.5 ? '#111113' : '#ffffff';
                    const [oL, oC, oH] = chroma(solidHex).oklch();
                    const formatOklch = `${(oL * 100).toFixed(0)}% ${oC.toFixed(2)} ${isNaN(oH) ? 0 : oH.toFixed(0)}`;

                    solidCol.innerHTML += `
                        <div class="palette-cell">
                            <div class="color-block" style="background-color: ${solidHex}; color: ${textContrast}">
                                <div class="format-row"><span>HEX</span><span>${solidHex.toUpperCase()}</span></div>
                                <div class="format-row"><span>LCH</span><span>${formatOklch}</span></div>
                            </div>
                        </div>
                    `;

                    if (showAlpha) {
                        if (Number(k) <= 500) {
                            const aHex = chroma(colorHex).alpha(a).hex();
                            alphaCol.innerHTML += `
                                <div class="palette-cell">
                                    <div class="alpha-wrap">
                                        <div class="alpha-inner" style="background-color: ${aHex}; color: ${textContrast}">
                                            <div class="format-row"><span>HEX</span><span>${aHex.toUpperCase()}</span></div>
                                            <div class="format-row"><span>Op.</span><span>${(a * 100).toFixed(0)}%</span></div>
                                        </div>
                                    </div>
                                </div>
                            `;
                        } else {
                            alphaCol.innerHTML += `<div class="palette-cell"><div class="missing">—</div></div>`;
                        }
                    }
                    
                    if (showNeutrals) {
                        const accentOk = chroma(colorHex).oklch();
                        const balancedL = getBalancedGrayL(accentOk[0], accentOk[1], accentOk[2]);
                        
                        // Use manual neutral base for Chroma/Hue, but calculated Lightness
                        const nBaseOk = chroma(neutralBasePicker.value).oklch();
                        const neutralBaseHex = chroma.oklch(balancedL, nBaseOk[1], nBaseOk[2]).hex();
                        
                        const nHex = interpolateOklchShifted(neutralBaseHex, bg, a, c);
                        const nContrast = chroma(nHex).luminance() > 0.5 ? '#111113' : '#ffffff';
                        const nOklch = chroma(nHex).oklch();
                        const nFormat = `${(nOklch[0] * 100).toFixed(0)}% ${nOklch[1].toFixed(2)}`;
                        neutralCol.innerHTML += `
                            <div class="palette-cell">
                                <div class="color-block" style="background-color: ${nHex}; color: ${nContrast}">
                                    <div class="format-row"><span>HEX</span><span>${nHex.toUpperCase()}</span></div>
                                    <div class="format-row"><span>LCH</span><span>${nFormat}</span></div>
                                </div>
                            </div>
                        `;
                    }
                });

                paletteTable.appendChild(solidCol);
                if (showAlpha) paletteTable.appendChild(alphaCol);
                if (showNeutrals) paletteTable.appendChild(neutralCol);
            });
        }

        exportSvgBtn.addEventListener('click', async () => {
            const swatchSize = 40;
            const gap = 4;
            const padding = 20;
            const weights = Object.keys(colorsMap).sort((a, b) => Number(a) - Number(b));

            const drawThemes = [
                { bg: themes.light.low, textBg: themes.light.high },
                { bg: themes.dark.low, textBg: themes.dark.high }
            ];

            const neutralColsPerColor = showNeutrals ? 1 : 0;
            const colsPerColor = (showAlpha ? 2 : 1) + neutralColsPerColor;
            const totalCols = baseColors.length * colsPerColor;

            const themeWidth = padding * 2 + (swatchSize * totalCols) + (gap * (totalCols - 1));
            const themeHeight = padding * 2 + (swatchSize * weights.length) + (gap * (weights.length - 1));

            const svgWidth = themeWidth * 2;
            const svgHeight = themeHeight;

            let svgContent = `<svg xmlns="http://www.w3.org/2000/svg" width="${svgWidth}" height="${svgHeight}" viewBox="0 0 ${svgWidth} ${svgHeight}">`;

            drawThemes.forEach((t, tIndex) => {
                const xThemeOffset = tIndex * themeWidth;

                svgContent += `<rect x="${xThemeOffset}" y="0" width="${themeWidth}" height="${themeHeight}" fill="${t.bg}"/>`;

                let y = padding;
                weights.forEach(w => {
                    const { a, c } = colorsMap[w];
                    const targetTextBg = c > 0 ? t.textBg : t.bg;

                    let x = xThemeOffset + padding;
                    baseColors.forEach(colorItem => {
                        const baseHex = colorItem.hex;
                        const solidHex = interpolateOklchShifted(baseHex, targetTextBg, a, c);

                        svgContent += `<rect x="${x}" y="${y}" width="${swatchSize}" height="${swatchSize}" fill="${solidHex}" rx="4"/>`;
                        x += swatchSize + gap;

                        if (showAlpha) {
                            if (Number(w) <= 500) {
                                const aHex = chroma(baseHex).alpha(a).hex();
                                svgContent += `
                                    <g transform="translate(${x}, ${y})">
                                        <rect width="${swatchSize}" height="${swatchSize}" fill="${t.bg}" rx="4"/>
                                        <rect width="${swatchSize}" height="${swatchSize}" fill="${aHex}" rx="4"/>
                                    </g>
                                `;
                            }
                            x += swatchSize + gap;
                        }
                        
                        if (showNeutrals) {
                            const accentOk = chroma(baseHex).oklch();
                            const balancedL = getBalancedGrayL(accentOk[0], accentOk[1], accentOk[2]);
                            const nBaseOk = chroma(neutralBasePicker.value).oklch();
                            const neutralBaseHex = chroma.oklch(balancedL, nBaseOk[1], nBaseOk[2]).hex();
                            const nHex = interpolateOklchShifted(neutralBaseHex, targetTextBg, a, c);
                            svgContent += `<rect x="${x}" y="${y}" width="${swatchSize}" height="${swatchSize}" fill="${nHex}" rx="4"/>`;
                            x += swatchSize + gap;
                        }
                    });
                    y += swatchSize + gap;
                });
            });

            svgContent += `</svg>`;

            const blob = new Blob([svgContent], { type: "text/plain" });

            try {
                const item = new ClipboardItem({ 'text/plain': blob });
                await navigator.clipboard.write([item]);
                const origText = exportSvgBtn.textContent;
                exportSvgBtn.textContent = "SVG Скопирован!";
                setTimeout(() => exportSvgBtn.textContent = origText, 2000);
            } catch (e) {
                console.error("Clipboard error", e);
                // Fallback direct copy (works in older browsers) 
                try {
                    await navigator.clipboard.writeText(svgContent);
                    const origText = exportSvgBtn.textContent;
                    exportSvgBtn.textContent = "SVG Скопирован!";
                    setTimeout(() => exportSvgBtn.textContent = origText, 2000);
                } catch (fallbackE) {
                    alert("Ошибка копирования в буфер обмена.");
                }
            }
        });

        setupThemeInputs();
        document.documentElement.style.setProperty('--bg-base', lowBasePicker.value);
        document.documentElement.style.setProperty('--text-base', chroma(lowBasePicker.value).luminance() < 0.5 ? '#ffffff' : '#111113');
        renderSidebarColors();
        updateAccentStyles();
        render();

    </script>
</body>

</html>
