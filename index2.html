<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Hue-Shift Palette Generator (Oklch)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chroma-js/2.4.2/chroma.min.js"></script>
    <style>
        :root {
            --bg-color: #0f1014;
            --surface-color: #1a1c23;
            --surface-hover: #252832;
            --text-primary: #ffffff;
            --text-secondary: #9094a6;
            --border-color: #2b2e3b;
            --accent-color: #4facfe;
            --accent-glow: rgba(79, 172, 254, 0.4);

            --checkers: repeating-conic-gradient(#2b2e3b 0% 25%, transparent 0% 50%) 50% / 10px 10px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            background: var(--surface-color);
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
            overflow: hidden;
            display: grid;
            grid-template-columns: 350px 1fr;
        }

        /* Sidebar sidebar */
        .sidebar {
            padding: 30px;
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 24px;
            background: linear-gradient(180deg, rgba(26, 28, 35, 1) 0%, rgba(20, 22, 28, 1) 100%);
            z-index: 20;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
            background: linear-gradient(90deg, #4facfe, #00f2fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .control-group label {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        input[type="text"] {
            width: 100%;
            background: #111217;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px 16px;
            color: #fff;
            font-size: 14px;
            font-family: monospace;
            transition: all 0.2s;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .color-input-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #111217;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 8px 12px;
            transition: all 0.2s;
        }

        .color-input-wrapper:focus-within {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 6px;
            cursor: pointer;
            padding: 0;
            background: none;
        }

        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }

        input[type="color"]::-webkit-color-swatch {
            border: none;
            border-radius: 6px;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.1);
        }

        .color-input-wrapper input[type="text"] {
            background: transparent;
            border: none;
            padding: 0;
            margin: 0;
            box-shadow: none !important;
        }

        .switch-theme-btn,
        .export-btn {
            background: var(--surface-hover);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .export-btn {
            background: rgba(79, 172, 254, 0.1);
            color: #4facfe;
            border-color: rgba(79, 172, 254, 0.3);
            margin-top: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .switch-theme-btn:hover {
            background: #2e313d;
        }

        .export-btn:hover {
            background: rgba(79, 172, 254, 0.2);
        }

        /* Content area */
        .content {
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 30px;
            overflow-y: auto;
            max-height: 90vh;
            background-color: var(--bg-preview-color);
            /* Dynamic Background */
            transition: background-color 0.3s ease;
            position: relative;
        }

        .content::before {
            content: "Preview Background matches Low Contrast Base";
            position: absolute;
            top: 10px;
            right: 20px;
            font-size: 11px;
            color: var(--text-preview-color);
            opacity: 0.5;
            font-weight: 500;
        }

        /* Scrollbar */
        .content::-webkit-scrollbar {
            width: 8px;
        }

        .content::-webkit-scrollbar-track {
            background: transparent;
        }

        .content::-webkit-scrollbar-thumb {
            background: rgba(128, 128, 128, 0.3);
            border-radius: 4px;
        }

        .content::-webkit-scrollbar-thumb:hover {
            background: rgba(128, 128, 128, 0.5);
        }

        .palette-grid {
            display: grid;
            grid-template-columns: 50px 1fr 1fr;
            gap: 16px;
        }

        .palette-header {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-preview-color);
            opacity: 0.7;
            font-weight: 600;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(128, 128, 128, 0.2);
        }

        .palette-row {
            display: contents;
        }

        .palette-weight {
            display: flex;
            flex-direction: column;
            justify-content: center;
            font-size: 14px;
            color: var(--text-preview-color);
            font-weight: 600;
        }

        .color-block {
            display: flex;
            flex-direction: column;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(128, 128, 128, 0.1);
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .color-block:hover {
            transform: translateY(-2px);
            z-index: 10;
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.2);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .color-preview {
            height: 56px;
            width: 100%;
        }

        .color-preview.alpha-bg {
            background-color: var(--bg-preview-color);
            background-image: repeating-conic-gradient(rgba(128, 128, 128, 0.1) 0% 25%, transparent 0% 50%);
            background-size: 10px 10px;
        }

        .color-info {
            padding: 12px 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            background: inherit;
        }

        .color-format {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: monospace;
            font-size: 11px;
        }

        .format-label {
            color: var(--text-preview-color);
            opacity: 0.6;
            font-weight: 500;
            font-size: 10px;
        }

        .format-value {
            color: var(--text-preview-color);
            opacity: 0.9;
        }

        .missing-alpha {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: var(--text-preview-color);
            font-size: 12px;
            opacity: 0.3;
            background: rgba(255, 255, 255, 0.02);
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }

            .sidebar {
                border-right: none;
                border-bottom: 1px solid var(--border-color);
            }

            .content {
                max-height: none;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="sidebar">
            <div class="header">
                <h1>Oklch Advanced</h1>
                <p>Фиксированный Hue, динамический закрашенный фон и плавный Hue Shift алгоритм (В стиле Tailwind &
                    Radix).</p>
            </div>

            <div class="control-group">
                <label>Theme Context</label>
                <button class="switch-theme-btn" id="themeSwitch">Current: Dark Theme</button>
            </div>

            <div class="control-group">
                <label>Название цвета (Prefix)</label>
                <input type="text" id="colorName" value="brand">
            </div>

            <div class="control-group">
                <label>Основной цвет (Main Color, HEX)</label>
                <div class="color-input-wrapper">
                    <input type="color" id="mainColorPicker" value="#027bf3">
                    <input type="text" id="mainColorText" value="#027bf3">
                </div>
            </div>

            <div class="control-group">
                <label>Low Contrast Base (Фон, HEX)</label>
                <div class="color-input-wrapper">
                    <input type="color" id="lowBasePicker" value="#111113">
                    <input type="text" id="lowBaseText" value="#111113">
                </div>
            </div>

            <div class="control-group">
                <label>High Contrast Base (Текст, HEX)</label>
                <div class="color-input-wrapper">
                    <input type="color" id="highBasePicker" value="#ffffff">
                    <input type="text" id="highBaseText" value="#ffffff">
                </div>
            </div>

            <button class="export-btn" id="exportSvgBtn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                    <polyline points="7 10 12 15 17 10" />
                    <line x1="12" y1="15" x2="12" y2="3" />
                </svg>
                Экспорт палитры в SVG
            </button>
        </div>

        <div class="content" id="previewContent">
            <div class="palette-grid" id="paletteGrid">
                <div class="palette-header">Шаг</div>
                <div class="palette-header">Solid Color</div>
                <div class="palette-header">Alpha Color</div>
                <!-- Generated rows will go here -->
            </div>
        </div>
    </div>

    <script>
        const colorsMap = {
            50: { a: 0.1, c: -1 },
            100: { a: 0.15, c: -1 },
            150: { a: 0.2, c: -1 },
            200: { a: 0.3, c: -1 },
            250: { a: 0.4, c: -1 },
            300: { a: 0.5, c: -1 },
            350: { a: 0.6, c: -1 },
            400: { a: 0.7, c: -1 },
            450: { a: 0.8, c: -1 },
            500: { a: 0.9, c: -1 },
            550: { a: 1, c: 1 },
            600: { a: 0.9, c: 1 },
            650: { a: 0.8, c: 1 },
            700: { a: 0.7, c: 1 },
            750: { a: 0.6, c: 1 },
            800: { a: 0.5, c: 1 },
            850: { a: 0.4, c: 1 },
            900: { a: 0.3, c: 1 },
            950: { a: 0.2, c: 1 },
            1000: { a: 0.15, c: 1 },
        };

        const themes = {
            light: { low: '#ffffff', high: '#111113', name: 'Light Theme' },
            dark: { low: '#111113', high: '#ffffff', name: 'Dark Theme' }
        };

        let currentTheme = 'dark';
        let currentPaletteData = {};

        // DOM Elements
        const themeSwitch = document.getElementById('themeSwitch');
        const colorName = document.getElementById('colorName');
        const mainColorPicker = document.getElementById('mainColorPicker');
        const mainColorText = document.getElementById('mainColorText');
        const lowBasePicker = document.getElementById('lowBasePicker');
        const lowBaseText = document.getElementById('lowBaseText');
        const highBasePicker = document.getElementById('highBasePicker');
        const highBaseText = document.getElementById('highBaseText');
        const paletteGrid = document.getElementById('paletteGrid');
        const exportSvgBtn = document.getElementById('exportSvgBtn');
        const previewContent = document.getElementById('previewContent');

        function setupSync(picker, text, renderCallback) {
            picker.addEventListener('input', (e) => {
                text.value = e.target.value;
                renderCallback();
            });
            text.addEventListener('input', (e) => {
                const val = e.target.value;
                if (chroma.valid(val)) {
                    picker.value = chroma(val).hex();
                    renderCallback();
                }
            });
        }

        themeSwitch.addEventListener('click', () => {
            currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
            themeSwitch.textContent = `Current: ${themes[currentTheme].name}`;

            lowBasePicker.value = themes[currentTheme].low;
            lowBaseText.value = themes[currentTheme].low;

            highBasePicker.value = themes[currentTheme].high;
            highBaseText.value = themes[currentTheme].high;

            render();
        });

        colorName.addEventListener('input', render);

        setupSync(mainColorPicker, mainColorText, render);
        setupSync(lowBasePicker, lowBaseText, render);
        setupSync(highBasePicker, highBaseText, render);

        function formatOklch(color) {
            if (!color) return '';
            const [l, c, h] = chroma(color).oklch();
            const lStr = (l * 100).toFixed(1) + '%';
            const cStr = c ? c.toFixed(3) : '0';
            const hStr = isNaN(h) ? '0' : h.toFixed(1);
            return `${lStr} ${cStr} ${hStr}`;
        }

        // Custom manual Oklch Interpolation to preserve/shift Hue
        function interpolateOklchShifted(baseColorHex, targetBgHex, ratio) {
            // ratio: 0.0 -> full background, 1.0 -> full base color
            const base = chroma(baseColorHex).oklch();
            const bg = chroma(targetBgHex).oklch();

            let [bL, bC, bH] = base;
            const [gL, gC, gH] = bg;

            if (isNaN(bH)) bH = 0;

            // 1. Interpolate Lightness linearly
            const resL = bL * ratio + gL * (1 - ratio);

            // 2. Interpolate Chroma linearly. 
            // Often background (like white/black) has near 0 chroma.
            const resC = bC * ratio + (isNaN(gC) ? 0 : gC) * (1 - ratio);

            // 3. Hue Shifting. 
            // Instead of mixing with background hue (which makes it muddy),
            // we start at base Hue, and apply a very slight temperature shift.
            // E.g. shift slightly towards Yellow for lights, towards Blue for darks.
            // + ratio goes from 1.0 (550 weight) down to 0.1 (extreme weights).
            // (1 - ratio) gives us how far we are from the base color (0 to 0.9).
            const shiftAmount = (1 - ratio) * 15; // Max 15 degrees shift at the far ends

            let resH = bH;

            if (gL > 0.5) {
                // Background is light (White) -> Weight < 500
                // We shift hue up slightly to make lighter tints a bit warmer/brighter
                resH = bH + shiftAmount;
            } else {
                // Background is dark (Black) -> Weight > 500
                // We shift hue down slightly to make dark shades a bit cooler/deeper
                resH = bH - shiftAmount;
            }

            return chroma.oklch(resL, resC, resH);
        }

        function render() {
            const name = colorName.value || 'color';
            const color = mainColorPicker.value;
            const lowBase = lowBasePicker.value;
            const highBase = highBasePicker.value;

            // Update Dynamic Background
            previewContent.style.setProperty('--bg-preview-color', lowBase);
            // Decide text color for preview dynamically based on bg lightness
            const isDarkBg = chroma(lowBase).luminance() < 0.3;
            previewContent.style.setProperty('--text-preview-color', isDarkBg ? '#ffffff' : '#111113');

            // Clear previous visually generated rows while keeping headers
            const headers = Array.from(paletteGrid.querySelectorAll('.palette-header'));
            paletteGrid.innerHTML = '';
            headers.forEach(h => paletteGrid.appendChild(h));

            currentPaletteData = {};

            Object.entries(colorsMap).forEach(([key, { a, c }]) => {
                const i = Number(key);

                const contrastBase = c > 0 ? highBase : lowBase;

                // --- ADVANCED HUE SHIFT INTERPOLATION ---
                // We use our custom function instead of simple chroma.mix
                const solidColorChroma = interpolateOklchShifted(color, contrastBase, a);
                const solidColorHex = solidColorChroma.hex();

                // Alpha color (отсутствуют для оттенков > 500)
                let alphaColorHex = '';
                if (i <= 500) {
                    alphaColorHex = chroma(color).alpha(a).hex();
                }

                currentPaletteData[key] = {
                    solidHex: solidColorHex,
                    solidOklch: formatOklch(solidColorHex),
                    alphaHex: alphaColorHex,
                    alphaValue: a
                };

                // Render UI Row
                const row = document.createElement('div');
                row.className = 'palette-row';

                const weightDiv = document.createElement('div');
                weightDiv.className = 'palette-weight';
                weightDiv.textContent = key;

                // Render Solid block
                const solidBlock = document.createElement('div');
                solidBlock.className = 'color-block';
                solidBlock.innerHTML = `
                    <div class="color-preview" style="background-color: ${solidColorHex};"></div>
                    <div class="color-info">
                        <div class="color-format"><span class="format-label">HEX</span><span class="format-value">${solidColorHex.toUpperCase()}</span></div>
                        <div class="color-format"><span class="format-label">okLCH</span><span class="format-value">${formatOklch(solidColorHex)}</span></div>
                    </div>
                `;

                // Render Alpha block
                const alphaBlock = document.createElement('div');
                alphaBlock.className = 'color-block';
                if (alphaColorHex) {
                    alphaBlock.innerHTML = `
                        <div class="color-preview alpha-bg">
                            <div style="width: 100%; height: 100%; background-color: ${alphaColorHex};"></div>
                        </div>
                        <div class="color-info">
                            <div class="color-format"><span class="format-label">HEX</span><span class="format-value">${alphaColorHex.toUpperCase()}</span></div>
                            <div class="color-format"><span class="format-label">Opacity</span><span class="format-value">${a * 100}%</span></div>
                        </div>
                    `;
                } else {
                    alphaBlock.innerHTML = `<div class="missing-alpha">—</div>`;
                }

                row.appendChild(weightDiv);
                row.appendChild(solidBlock);
                row.appendChild(alphaBlock);
                paletteGrid.appendChild(row);
            });
        }

        exportSvgBtn.addEventListener('click', () => {
            const name = colorName.value || 'palette';

            const swatchWidth = 200;
            const swatchHeight = 80;
            const padding = 20;
            const headerHeight = 60;
            const weights = Object.keys(currentPaletteData);
            const columnsCount = 3;
            const rowHeight = swatchHeight + 50;

            const svgWidth = (swatchWidth * columnsCount) + (padding * 4) + 60;
            const svgHeight = (weights.length * rowHeight) + (padding * 2) + headerHeight;
            const isDarkBg = chroma(lowBasePicker.value).luminance() < 0.3;
            const textColor = isDarkBg ? '#ffffff' : '#111113';
            const textMuted = isDarkBg ? '#9094a6' : '#606476';

            let svgContent = `<svg xmlns="http://www.w3.org/2000/svg" width="${svgWidth}" height="${svgHeight}" viewBox="0 0 ${svgWidth} ${svgHeight}">
                <rect width="${svgWidth}" height="${svgHeight}" fill="${lowBasePicker.value}" rx="16"/>
                <text x="${padding}" y="${padding + 24}" fill="${textColor}" font-family="sans-serif" font-size="24" font-weight="bold">${name} (Advanced OkLCH Engine)</text>
                
                <text x="${padding}" y="${padding + headerHeight}" fill="${textMuted}" font-family="sans-serif" font-size="14" font-weight="bold">WEIGHT</text>
                <text x="${padding + 80}" y="${padding + headerHeight}" fill="${textMuted}" font-family="sans-serif" font-size="14" font-weight="bold">SOLID COLOR</text>
                <text x="${padding + 80 + swatchWidth + padding}" y="${padding + headerHeight}" fill="${textMuted}" font-family="sans-serif" font-size="14" font-weight="bold">ALPHA COLOR</text>
             `;

            let yOffset = padding + headerHeight + 20;

            weights.forEach((w) => {
                const d = currentPaletteData[w];
                svgContent += `<text x="${padding}" y="${yOffset + (swatchHeight / 2) + 6}" fill="${textColor}" font-family="sans-serif" font-size="18" font-weight="bold">${w}</text>`;

                let xOffset = padding + 80;
                svgContent += `
                    <g transform="translate(${xOffset}, ${yOffset})">
                        <rect width="${swatchWidth}" height="${swatchHeight}" fill="${d.solidHex}" rx="8"/>
                        <text x="0" y="${swatchHeight + 24}" fill="${textColor}" font-family="monospace" font-size="12">HEX: ${d.solidHex.toUpperCase()}</text>
                        <text x="0" y="${swatchHeight + 42}" fill="${textColor}" font-family="monospace" font-size="12">okLCH: ${d.solidOklch}</text>
                    </g>
                 `;

                xOffset += swatchWidth + padding;
                if (d.alphaHex) {
                    svgContent += `
                        <g transform="translate(${xOffset}, ${yOffset})">
                            <rect width="${swatchWidth}" height="${swatchHeight}" fill="#2b2e3b" rx="8"/>
                            <rect width="${swatchWidth}" height="${swatchHeight}" fill="${d.alphaHex}" rx="8"/>
                            <text x="0" y="${swatchHeight + 24}" fill="${textColor}" font-family="monospace" font-size="12">HEX: ${d.alphaHex.toUpperCase()}</text>
                            <text x="0" y="${swatchHeight + 42}" fill="${textColor}" font-family="monospace" font-size="12">Opacity: ${d.alphaValue * 100}%</text>
                        </g>
                     `;
                } else {
                    svgContent += `
                        <g transform="translate(${xOffset}, ${yOffset})">
                            <rect width="${swatchWidth}" height="${swatchHeight}" fill="${textColor}" fill-opacity="0.05" rx="8"/>
                        </g>
                     `;
                }
                yOffset += rowHeight;
            });

            svgContent += `\n</svg>`;

            const blob = new Blob([svgContent], { type: "image/svg+xml" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `${name}-palette.svg`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });

        render();
    </script>
</body>

</html>
