<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Hue-Shift Palette Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chroma-js/2.4.2/chroma.min.js"></script>
    <style>
        :root {
            --bg-base: #111113;
            --text-base: #ffffff;
            --accent: #027bf3;
            --checkers: repeating-conic-gradient(rgba(128, 128, 128, 0.1) 0% 25%, transparent 0% 50%) 50% / 10px 10px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-base);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
            transition: background-color 0.3s, color 0.3s;
        }

        .top-bar {
            display: flex;
            flex-wrap: wrap;
            align-items: flex-end;
            gap: 24px;
            padding: 20px;
            background: rgba(128, 128, 128, 0.05);
            border-radius: 12px;
            margin-bottom: 32px;
        }

        .top-bar-branding {
            min-width: 250px;
        }

        .top-bar-branding h1 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .top-bar-branding p {
            font-size: 11px;
            opacity: 0.6;
        }

        .content {
            flex-grow: 1;
            overflow-x: auto;
            padding: 0 10px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .control-group label {
            font-size: 11px;
            font-weight: 600;
            opacity: 0.5;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input[type="text"], input[type="number"] {
            background: rgba(128, 128, 128, 0.1);
            border: none;
            border-radius: 6px;
            padding: 8px 10px;
            color: inherit;
            font-family: monospace;
            font-size: 13px;
            outline: none;
        }

        input[type="text"]:focus {
            box-shadow: 0 0 0 2px var(--accent);
        }

        .color-input-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        input[type="color"] {
            -webkit-appearance: none;
            appearance: none;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 4px;
            cursor: pointer;
            padding: 0;
            background: none;
        }

        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 4px; }

        .btn {
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 10px 16px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: filter 0.2s;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn:hover { filter: brightness(1.1); }
        .btn-primary { background: var(--text-base) !important; color: var(--bg-base) !important; font-weight: 600; }
        .btn-outline { background: transparent; border: 1px solid rgba(128, 128, 128, 0.3); color: inherit; }

        .palette-table {
            display: flex;
            gap: 20px;
            padding-bottom: 60px;
            width: max-content;
        }

        .palette-table.compare-mode {
            gap: 0;
        }

        .palette-group {
            display: flex;
            flex-direction: column;
            gap: 0; /* Changed to 0 as we use cell gaps */
            padding: 4px;
            border-radius: 12px;
            transition: all 0.2s;
        }
        
        .palette-col {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .palette-table.compare-mode .palette-group {
            padding: 0;
        }

        .palette-group.dragging {
            opacity: 0.4;
            background: rgba(128, 128, 128, 0.05);
        }

        .palette-group.drag-over {
            box-shadow: 0 0 0 2px var(--accent);
        }

        .palette-header {
            font-size: 13px;
            font-weight: 600;
            opacity: 0.7;
            padding: 12px 0 20px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* New Column Input Styles */
        .col-input-card {
            background: rgba(128, 128, 128, 0.05);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 24px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 156px; /* 140 + padding */
            position: relative;
        }

        .col-input-name {
            background: transparent !important;
            font-weight: 600;
            font-size: 14px;
            padding: 0 !important;
            height: 24px;
        }

        .col-input-hex-row {
            background: rgba(128, 128, 128, 0.08);
            border-radius: 8px;
            display: flex;
            align-items: center;
            padding: 4px 8px;
            gap: 8px;
        }

        .col-hex-label {
            font-size: 10px;
            font-weight: 700;
            opacity: 0.4;
        }

        .col-hex-value {
            font-family: monospace;
            font-size: 12px;
            flex-grow: 1;
            background: transparent !important;
            padding: 0 !important;
        }

        .col-remove-btn {
            background: none;
            border: none;
            color: inherit;
            opacity: 0.3;
            cursor: pointer;
            padding: 4px;
            font-size: 14px;
        }
        .col-remove-btn:hover { opacity: 1; color: #ff4d4f; }

        .palette-cell {
            height: 48px;
            display: flex;
            align-items: center;
            margin-bottom: 6px;
        }

        .weight-cell {
            width: 60px;
            font-weight: 600;
            font-size: 13px;
            opacity: 0.4;
            justify-content: flex-end;
            padding-right: 16px;
            cursor: pointer;
            user-select: none;
        }
        .weight-cell:hover { opacity: 1; color: var(--accent); }
        .weight-cell.focused { opacity: 1; color: var(--accent); font-size: 15px; }

        .color-block {
            width: 140px;
            height: 48px;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 10px;
            border: none;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .compare-mode .palette-group { width: 140px; }
        .compare-mode .palette-col { width: 140px; }
        .compare-mode .color-block { border-radius: 0; width: 100%; }
        .compare-mode .palette-cell:not(.visible-comparing) { opacity: 0.1; filter: blur(2px); }
        .compare-mode .visible-comparing .format-row { display: none; }

        .format-row {
            display: flex;
            justify-content: space-between;
            font-family: monospace;
            font-size: 10px;
            opacity: 0.8;
        }

        .format-row span.copyable {
            cursor: copy;
            padding: 1px 3px;
            border-radius: 3px;
        }

        .format-row span.copyable:hover { background: rgba(128, 128, 128, 0.2); }

        .alpha-wrap {
            width: 140px;
            height: 48px;
            border-radius: 6px;
            background-image: var(--checkers);
            overflow: hidden;
            transition: width 0.3s;
        }

        .alpha-inner {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 10px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            cursor: pointer;
            user-select: none;
            font-weight: 500;
        }
        
        .header-drag-handle {
            cursor: grab;
            opacity: 0.3;
            font-size: 16px;
            position: absolute;
            top: 4px;
            left: 50%;
            transform: translateX(-50%);
        }
        
        #resetBtn {
           margin-left: auto;
           opacity: 0.6;
        }
        #resetBtn:hover { opacity: 1; }
    </style>
</head>

<body>

    <div class="top-bar">
        <div class="top-bar-branding">
            <h1>Oklch Generator</h1>
            <p>Dynamic Custom Colors, No Dark Borders, SVG Clipboard Export.</p>
        </div>

        <button class="btn btn-outline" id="themeSwitchBtn">Theme: Light</button>

        <div class="control-group">
            <label>Background (Low)</label>
            <div class="color-input-row">
                <input type="color" id="lowBasePicker" value="#ffffff">
                <input type="text" id="lowBaseText" value="#ffffff" style="width: 80px;">
            </div>
        </div>
        
        <div class="control-group">
            <label>Text (High)</label>
            <div class="color-input-row">
                <input type="color" id="highBasePicker" value="#111113">
                <input type="text" id="highBaseText" value="#111113" style="width: 80px;">
            </div>
        </div>

        <div class="control-group">
            <label>Lightness Range (L%)</label>
            <div class="color-input-row" style="gap: 8px;">
                <input type="number" id="maxLightness" value="100" min="0" max="100" style="width:55px;">
                <span style="opacity:0.4">→</span>
                <input type="number" id="minLightness" value="0" min="0" max="100" style="width:55px;">
            </div>
        </div>

        <div class="control-group" style="flex-direction: row; gap: 16px; align-self: center; margin-bottom: 4px;">
            <label class="checkbox-label"><input type="checkbox" id="showAlphaCheck"> Alpha</label>
            <label class="checkbox-label"><input type="checkbox" id="showHueShiftCheck"> Hue Shift</label>
            <label class="checkbox-label"><input type="checkbox" id="showNeutralsCheck"> Grey Balance</label>
        </div>

        <button class="btn" id="addColorBtn" style="background: rgba(128,128,128,0.1); color: inherit;">+ Add Color</button>
        <button class="btn btn-primary" id="exportSvgBtn">Copy SVG</button>
        <button class="btn btn-outline" id="resetBtn" title="Reset to Defaults">↺</button>
    </div>

    <div class="content">
        <div class="palette-table" id="paletteTable"></div>
    </div>

    <script>
        const colorsMap = {
            50: { a: 0.04, c: -1 }, 100: { a: 0.08, c: -1 }, 150: { a: 0.12, c: -1 }, 200: { a: 0.2, c: -1 },
            250: { a: 0.3, c: -1 }, 300: { a: 0.4, c: -1 }, 350: { a: 0.5, c: -1 }, 400: { a: 0.65, c: -1 },
            450: { a: 0.8, c: -1 }, 500: { a: 0.9, c: -1 }, 550: { a: 1, c: 1 }, 600: { a: 0.9, c: 1 },
            650: { a: 0.8, c: 1 }, 700: { a: 0.7, c: 1 }, 750: { a: 0.6, c: 1 }, 800: { a: 0.45, c: 1 },
            850: { a: 0.3, c: 1 }, 900: { a: 0.2, c: 1 }, 950: { a: 0.1, c: 1 }, 1000: { a: 0.04, c: 1 },
        };

        const themes = {
            light: { low: '#ffffff', high: '#111113', name: 'Light' },
            dark: { low: '#111113', high: '#ffffff', name: 'Dark' }
        };

        let currentTheme = 'light';
        let showAlpha = false;
        let useHueShift = false;
        let showNeutrals = false;
        let baseColors = [
            { id: 12, format: 'HEX', value: '#606060', hex: '#606060', name: 'Gray' },
            { id: 8, format: 'HEX', value: '#3E63DD', hex: '#3E63DD', name: 'Blue' },
            { id: 1, format: 'HEX', value: '#E5484D', hex: '#E5484D', name: 'Red' },
            { id: 2, format: 'HEX', value: '#F76B15', hex: '#F76B15', name: 'Orange' },
            { id: 3, format: 'HEX', value: '#FFB224', hex: '#FFB224', name: 'Amber' },
            { id: 4, format: 'HEX', value: '#30A46C', hex: '#30A46C', name: 'Green' },
            { id: 5, format: 'HEX', value: '#46A758', hex: '#46A758', name: 'Grass' },
            { id: 6, format: 'HEX', value: '#00A2C7', hex: '#00A2C7', name: 'Cyan' },
            { id: 7, format: 'HEX', value: '#0090FF', hex: '#0090FF', name: 'Sky' },
            { id: 9, format: 'HEX', value: '#7C66DC', hex: '#7C66DC', name: 'Violet' },
            { id: 10, format: 'HEX', value: '#AB4ABA', hex: '#AB4ABA', name: 'Plum' },
            { id: 11, format: 'HEX', value: '#E93D82', hex: '#E93D82', name: 'Pink' },
            { id: 13, format: 'HEX', value: '#64635F', hex: '#64635F', name: 'Olive' },
            { id: 14, format: 'HEX', value: '#5E636E', hex: '#5E636E', name: 'Slate' }
        ];

        const defaultBaseColors = JSON.parse(JSON.stringify(baseColors));
        let focusedStep = null;

        const themeSwitchBtn = document.getElementById('themeSwitchBtn');
        const lowBasePicker = document.getElementById('lowBasePicker');
        const lowBaseText = document.getElementById('lowBaseText');
        const highBasePicker = document.getElementById('highBasePicker');
        const highBaseText = document.getElementById('highBaseText');
        const showAlphaCheck = document.getElementById('showAlphaCheck');
        const showHueShiftCheck = document.getElementById('showHueShiftCheck');
        const showNeutralsCheck = document.getElementById('showNeutralsCheck');
        const maxLightnessInput = document.getElementById('maxLightness');
        const minLightnessInput = document.getElementById('minLightness');
        const addColorBtn = document.getElementById('addColorBtn');
        const paletteTable = document.getElementById('paletteTable');
        const exportSvgBtn = document.getElementById('exportSvgBtn');
        const resetBtn = document.getElementById('resetBtn');

        function savePalette() {
            const data = {
                currentTheme,
                showAlpha,
                useHueShift,
                showNeutrals,
                baseColors,
                lowBase: lowBaseText.value,
                highBase: highBaseText.value,
                maxL: maxLightnessInput.value,
                minL: minLightnessInput.value
            };
            localStorage.setItem('oklch-palette-data', JSON.stringify(data));
        }

        function loadPalette() {
            const saved = localStorage.getItem('oklch-palette-data');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    currentTheme = data.currentTheme || 'light';
                    showAlpha = data.showAlpha !== undefined ? data.showAlpha : false;
                    useHueShift = data.useHueShift !== undefined ? data.useHueShift : false;
                    showNeutrals = data.showNeutrals !== undefined ? data.showNeutrals : false;
                    baseColors = data.baseColors || baseColors;
                    
                    themeSwitchBtn.textContent = `Theme: ${themes[currentTheme].name}`;
                    lowBasePicker.value = data.lowBase || themes[currentTheme].low;
                    lowBaseText.value = data.lowBase || themes[currentTheme].low;
                    highBasePicker.value = data.highBase || themes[currentTheme].high;
                    highBaseText.value = data.highBase || themes[currentTheme].high;
                    
                    showAlphaCheck.checked = showAlpha;
                    showHueShiftCheck.checked = useHueShift;
                    showNeutralsCheck.checked = showNeutrals;
                    
                    maxLightnessInput.value = data.maxL || 100;
                    minLightnessInput.value = data.minL || 0;
                } catch(e) { console.error("Load fail", e); }
            }
        }

        function setupThemeInputs() {
            function updateThemeColors() {
                if (chroma.valid(lowBaseText.value) && chroma.valid(highBaseText.value)) {
                    document.documentElement.style.setProperty('--bg-base', lowBaseText.value);
                    document.documentElement.style.setProperty('--text-base', chroma(lowBaseText.value).luminance() < 0.5 ? '#ffffff' : '#111113');
                    render();
                }
            }

            lowBasePicker.addEventListener('input', (e) => { lowBaseText.value = e.target.value; updateThemeColors(); });
            lowBaseText.addEventListener('input', (e) => { if (chroma.valid(e.target.value)) { lowBasePicker.value = chroma(e.target.value).hex(); updateThemeColors(); } });

            highBasePicker.addEventListener('input', (e) => { highBaseText.value = e.target.value; updateThemeColors(); });
            highBaseText.addEventListener('input', (e) => { if (chroma.valid(e.target.value)) { highBasePicker.value = chroma(e.target.value).hex(); updateThemeColors(); } });

            themeSwitchBtn.addEventListener('click', () => {
                currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
                themeSwitchBtn.textContent = `Theme: ${themes[currentTheme].name}`;
                lowBasePicker.value = themes[currentTheme].low;
                lowBaseText.value = themes[currentTheme].low;
                highBasePicker.value = themes[currentTheme].high;
                highBaseText.value = themes[currentTheme].high;
                updateThemeColors();
            });

            showAlphaCheck.addEventListener('change', (e) => { showAlpha = e.target.checked; render(); });
            showHueShiftCheck.addEventListener('change', (e) => { useHueShift = e.target.checked; render(); });
            showNeutralsCheck.addEventListener('change', (e) => { showNeutrals = e.target.checked; render(); });

            maxLightnessInput.addEventListener('input', render);
            minLightnessInput.addEventListener('input', render);

            addColorBtn.addEventListener('click', () => {
                const newHex = chroma.random().hex();
                baseColors.push({ id: Date.now(), format: 'HEX', value: newHex, hex: newHex, name: 'New Color' });
                render();
            });

            resetBtn.addEventListener('click', () => {
                if (confirm('Сбросить все настройки к значениям по умолчанию?')) {
                    localStorage.removeItem('oklch-palette-data');
                    location.reload();
                }
            });
        }

        async function copyToClipboard(text, element) {
            try {
                await navigator.clipboard.writeText(text);
                const originalText = element.innerText;
                element.innerText = 'Copied!';
                setTimeout(() => element.innerText = originalText, 1000);
            } catch (err) {
                console.error('Failed to copy', err);
            }
        }

        function updateAccentStyles() {
            if (baseColors.length > 0) {
                const mainHex = baseColors[0].hex;
                document.documentElement.style.setProperty('--accent', mainHex);
                const luma = chroma(mainHex).luminance();
                const btnCols = document.querySelectorAll('.btn');
                btnCols.forEach(btn => {
                    if (!btn.classList.contains('btn-outline')) {
                        btn.style.color = luma > 0.4 ? '#111113' : '#ffffff';
                    }
                });
            }
        }

        function getBalancedGrayL(target_L, target_C, hue) {
            let sensitivity = 0.28; 
            let offset = 0;
            if ((hue >= 0 && hue <= 40) || (hue >= 280 && hue <= 360)) { sensitivity = 0.15; offset = 0.03; } 
            else if (hue >= 40 && hue <= 160) { sensitivity = 0.05; offset = 0.06; }
            let balancedL = target_L - (target_C * sensitivity) + offset;
            return Math.max(0, Math.min(1, balancedL));
        }

        function interpolateOklchShifted(baseColorHex, bgHex, ratio, cDirection) {
            const base = chroma(baseColorHex).oklch();
            const bg = chroma(bgHex).oklch();
            let [bL, bC, bH] = base; if (isNaN(bH)) bH = 0;
            const [gL, gC, gH] = bg;
            let maxL = parseFloat(maxLightnessInput.value) / 100; if (isNaN(maxL)) maxL = 1.0;
            let minL = parseFloat(minLightnessInput.value) / 100; if (isNaN(minL)) minL = 0.0;
            let targetL = gL;
            if (targetL > 0.5) targetL = Math.min(targetL, maxL); else targetL = Math.max(targetL, minL);
            const resL = bL * ratio + targetL * (1 - ratio);
            const resC = bC * ratio + (isNaN(gC) ? 0 : gC) * (1 - ratio);
            let resH = bH;
            if (useHueShift) {
                const shiftAmount = (1 - ratio) * 15;
                if (targetL > 0.5) resH = bH + shiftAmount; else resH = bH - shiftAmount;
            }
            return chroma.oklch(resL, resC, resH).hex();
        }

        function render() {
            paletteTable.innerHTML = '';
            if (focusedStep) paletteTable.classList.add('compare-mode');
            else paletteTable.classList.remove('compare-mode');

            const keys = Object.keys(colorsMap).sort((a, b) => Number(a) - Number(b));

            // Weights Column
            const weightCol = document.createElement('div');
            weightCol.className = 'palette-col';
            weightCol.style.paddingTop = '146px'; // Align with input cards
            keys.forEach(k => {
                const cell = document.createElement('div');
                cell.className = `palette-cell weight-cell ${focusedStep === k ? 'focused' : ''}`;
                cell.innerText = k;
                cell.onclick = () => { focusedStep = (focusedStep === k) ? null : k; render(); };
                weightCol.appendChild(cell);
            });
            paletteTable.appendChild(weightCol);

            baseColors.forEach((colorItem, index) => {
                const colorHex = colorItem.hex;
                const group = document.createElement('div');
                group.className = 'palette-group';
                group.draggable = true;
                group.dataset.index = index;

                // Input Card
                const card = document.createElement('div');
                card.className = 'col-input-card';
                card.innerHTML = `<span class="header-drag-handle">⋮⋮</span>`;
                
                const nameInp = document.createElement('input');
                nameInp.className = 'col-input-name';
                nameInp.value = colorItem.name;
                nameInp.oninput = (e) => { colorItem.name = e.target.value; savePalette(); };
                card.appendChild(nameInp);

                const hexRow = document.createElement('div');
                hexRow.className = 'col-input-hex-row';
                const picker = document.createElement('input');
                picker.type = 'color';
                picker.value = colorItem.hex;
                picker.oninput = (e) => { 
                    colorItem.hex = e.target.value; 
                    if(colorItem.format === 'HEX') colorItem.value = colorItem.hex;
                    else { const [h,s,l] = chroma(colorItem.hex).hsl(); colorItem.value = `${Math.round(h||0)},${Math.round(s*100)}%,${Math.round(l*100)}%`; }
                    updateAccentStyles(); render(); 
                };
                
                const hexVal = document.createElement('input');
                hexVal.className = 'col-hex-value';
                hexVal.value = colorItem.hex.toUpperCase();
                hexVal.oninput = (e) => { if(chroma.valid(e.target.value)) { colorItem.hex = chroma(e.target.value).hex(); picker.value = colorItem.hex; updateAccentStyles(); render(); } };

                const remBtn = document.createElement('button');
                remBtn.className = 'col-remove-btn';
                remBtn.innerHTML = '✕';
                remBtn.onclick = () => { if(baseColors.length > 1) { baseColors.splice(index, 1); updateAccentStyles(); render(); } };

                hexRow.appendChild(picker);
                hexRow.appendChild(hexVal);
                hexRow.appendChild(remBtn);
                card.appendChild(hexRow);
                group.appendChild(card);

                const solidCol = document.createElement('div');
                solidCol.className = 'palette-col';

                let alphaCol, neutralCol;
                if (showAlpha) { alphaCol = document.createElement('div'); alphaCol.className = 'palette-col'; }
                if (showNeutrals) { neutralCol = document.createElement('div'); neutralCol.className = 'palette-col'; }

                keys.forEach(k => {
                    const { a, c } = colorsMap[k];
                    const bg = c > 0 ? highBasePicker.value : lowBasePicker.value;
                    const solidHex = interpolateOklchShifted(colorHex, bg, a, c);
                    const isFocused = (focusedStep === k);

                    const textContrast = chroma(solidHex).luminance() > 0.5 ? '#111113' : '#ffffff';
                    const [oL, oC, oH] = chroma(solidHex).oklch();
                    const formatOklch = `${(oL * 100).toFixed(0)}% ${oC.toFixed(2)} ${Math.round(oH||0)}`;
                    
                    solidCol.innerHTML += `
                        <div class="palette-cell ${isFocused?'visible-comparing':''}">
                            <div class="color-block" style="background-color: ${solidHex}; color: ${textContrast}"
                                 onmousedown="document.body.style.backgroundColor='${solidHex}'"
                                 onmouseup="document.body.style.backgroundColor=''"
                                 onmouseleave="document.body.style.backgroundColor=''">
                                <div class="format-row"><span>HEX</span><span class="copyable" onclick="copyToClipboard('${solidHex.toUpperCase()}', this)">${solidHex.toUpperCase()}</span></div>
                                <div class="format-row"><span>LCH</span><span>${formatOklch}</span></div>
                            </div>
                        </div>`;

                    if (showAlpha) {
                        if (Number(k) <= 500) {
                            const aHex = chroma(colorHex).alpha(a).hex();
                            alphaCol.innerHTML += `
                                <div class="palette-cell ${isFocused?'visible-comparing':''}">
                                    <div class="alpha-wrap" onmousedown="document.body.style.backgroundColor='${aHex}'" onmouseup="document.body.style.backgroundColor=''" onmouseleave="document.body.style.backgroundColor=''">
                                        <div class="alpha-inner" style="background-color: ${aHex}; color: ${textContrast}">
                                            <div class="format-row"><span>HEX</span><span class="copyable" onclick="copyToClipboard('${aHex.toUpperCase()}', this)">${aHex.toUpperCase()}</span></div>
                                            <div class="format-row"><span>Op.</span><span>${(a * 100).toFixed(0)}%</span></div>
                                        </div>
                                    </div>
                                </div>`;
                        } else { alphaCol.innerHTML += `<div class="palette-cell ${isFocused?'visible-comparing':''}"><div style="width:140px; text-align:center; opacity:0.1">—</div></div>`; }
                    }
                    
                    if (showNeutrals) {
                        const accentOk = chroma(colorHex).oklch();
                        const balancedL = getBalancedGrayL(accentOk[0], accentOk[1], accentOk[2]);
                        const grayColor = baseColors.find(c => c.name.toLowerCase() === 'gray');
                        const nBaseOk = chroma(grayColor ? grayColor.hex : '#808080').oklch();
                        const neutralBaseHex = chroma.oklch(balancedL, nBaseOk[1], nBaseOk[2]).hex();
                        const nHex = interpolateOklchShifted(neutralBaseHex, bg, a, c);
                        const nContrast = chroma(nHex).luminance() > 0.5 ? '#111113' : '#ffffff';
                        const nOklch = chroma(nHex).oklch();
                        neutralCol.innerHTML += `
                            <div class="palette-cell ${isFocused?'visible-comparing':''}">
                                <div class="color-block" style="background-color: ${nHex}; color: ${nContrast}" onmousedown="document.body.style.backgroundColor='${nHex}'" onmouseup="document.body.style.backgroundColor=''" onmouseleave="document.body.style.backgroundColor=''">
                                    <div class="format-row"><span>HEX</span><span class="copyable" onclick="copyToClipboard('${nHex.toUpperCase()}', this)">${nHex.toUpperCase()}</span></div>
                                    <div class="format-row"><span>LCH</span><span>${(nOklch[0]*100).toFixed(0)}% ${nOklch[1].toFixed(2)}</span></div>
                                </div>
                            </div>`;
                    }
                });

                group.appendChild(solidCol);
                if (showAlpha) group.appendChild(alphaCol);
                if (showNeutrals) group.appendChild(neutralCol);

                // Drag and drop for columns
                group.addEventListener('dragstart', (e) => { group.classList.add('dragging'); e.dataTransfer.setData('text/plain', index); });
                group.addEventListener('dragend', () => group.classList.remove('dragging'));
                group.addEventListener('dragover', (e) => { e.preventDefault(); group.classList.add('drag-over'); });
                group.addEventListener('dragleave', () => group.classList.remove('drag-over'));
                group.addEventListener('drop', (e) => {
                    e.preventDefault();
                    const draggedIdx = parseInt(e.dataTransfer.getData('text/plain'));
                    if (draggedIdx !== index) {
                        const item = baseColors.splice(draggedIdx, 1)[0];
                        baseColors.splice(index, 0, item);
                        render();
                    }
                });

                paletteTable.appendChild(group);
            });
            savePalette();
        }

        exportSvgBtn.addEventListener('click', async () => {
            const swatchSize = 40; const gap = 4; const padding = 20;
            const weights = Object.keys(colorsMap).sort((a, b) => Number(a) - Number(b));
            const drawThemes = [{ bg: themes.light.low, textBg: themes.light.high }, { bg: themes.dark.low, textBg: themes.dark.high }];
            const colsPerColor = (showAlpha ? 2 : 1) + (showNeutrals ? 1 : 0);
            const totalCols = baseColors.length * colsPerColor;
            const themeWidth = padding * 2 + (swatchSize * totalCols) + (gap * (totalCols - 1));
            const themeHeight = padding * 2 + (swatchSize * weights.length) + (gap * (weights.length - 1));
            const svgWidth = themeWidth * 2;
            let svgContent = `<svg xmlns="http://www.w3.org/2000/svg" width="${svgWidth}" height="${themeHeight}" viewBox="0 0 ${svgWidth} ${themeHeight}">`;
            drawThemes.forEach((t, tIndex) => {
                const xOff = tIndex * themeWidth;
                svgContent += `<rect x="${xOff}" y="0" width="${themeWidth}" height="${themeHeight}" fill="${t.bg}"/>`;
                let y = padding;
                weights.forEach(w => {
                    const { a, c } = colorsMap[w]; const targetBg = c > 0 ? t.textBg : t.bg;
                    let x = xOff + padding;
                    baseColors.forEach(colorItem => {
                        const solidHex = interpolateOklchShifted(colorItem.hex, targetBg, a, c);
                        svgContent += `<rect x="${x}" y="${y}" width="${swatchSize}" height="${swatchSize}" fill="${solidHex}" rx="4"/>`;
                        x += swatchSize + gap;
                        if (showAlpha) { if (Number(w) <= 500) { const aHex = chroma(colorItem.hex).alpha(a).hex(); svgContent += `<g transform="translate(${x}, ${y})"><rect width="${swatchSize}" height="${swatchSize}" fill="${t.bg}" rx="4"/><rect width="${swatchSize}" height="${swatchSize}" fill="${aHex}" rx="4"/></g>`; } x += swatchSize + gap; }
                        if (showNeutrals) { const accentOk = chroma(colorItem.hex).oklch(); const balancedL = getBalancedGrayL(accentOk[0], accentOk[1], accentOk[2]); const grayColor = baseColors.find(c => c.name.toLowerCase() === 'gray'); const nBaseOk = chroma(grayColor ? grayColor.hex : '#808080').oklch(); const neutralBaseHex = chroma.oklch(balancedL, nBaseOk[1], nBaseOk[2]).hex(); const nHex = interpolateOklchShifted(neutralBaseHex, targetBg, a, c); svgContent += `<rect x="${x}" y="${y}" width="${swatchSize}" height="${swatchSize}" fill="${nHex}" rx="4"/>`; x += swatchSize + gap; }
                    });
                    y += swatchSize + gap;
                });
            });
            svgContent += `</svg>`;
            try {
                await navigator.clipboard.writeText(svgContent);
                const orig = exportSvgBtn.textContent; exportSvgBtn.textContent = "SVG Скопирован!";
                setTimeout(() => exportSvgBtn.textContent = orig, 2000);
            } catch (e) { alert("Ошибка копирования."); }
        });

        loadPalette();
        setupThemeInputs();
        document.documentElement.style.setProperty('--bg-base', lowBasePicker.value);
        document.documentElement.style.setProperty('--text-base', chroma(lowBasePicker.value).luminance() < 0.5 ? '#ffffff' : '#111113');
        updateAccentStyles();
        render();
    </script>
</body>
</html>
